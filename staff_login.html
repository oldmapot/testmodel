<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老娘領地 - 店員登入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #8b0000 0%, #ab545a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 12px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .logo {
            margin-bottom: 2px;
            text-align: center;
        }

        .logo-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            display: inline-block;
        }
        
        h1 {
            font-size: 28px;
            color: #8b0000;
            margin-bottom: 4px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 18px;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
        }
        
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #8b0000;
            background: white;
            box-shadow: 0 0 0 3px rgba(139,0,0,0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #8b0000;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .login-btn:hover {
            background: #6b0000;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139,0,0,0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #ffe5e5;
            color: #d00;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        
        .success-message {
            background: #e5ffe5;
            color: #2e7d32;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        
        .footer-note {
            margin-top: 28px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
        
        .demo-hint {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 16px;
            color: #666;
            text-align: left;
        }
        
        .demo-hint strong {
            color: #8b0000;
        }
        
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
        }

        /* 分店選擇彈窗 */
        .branch-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .branch-modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        
        .branch-title {
            font-size: 22px;
            color: #8b0000;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .staff-info {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        
        .branch-select {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .confirm-btn {
            width: 100%;
            padding: 14px;
            background: #8b0000;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <img src="https://i.postimg.cc/KvytPffF/wei-ming-ming-she-ji-(23).png" class="logo-img">
        </div>

        <h1>老娘領地</h1>
        <div class="subtitle">店員登入系統</div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>📱 登入帳號</label>
                <input type="text" id="userId" placeholder="請輸入帳號" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>🔑 登入密碼</label>
                <div class="password-wrapper">
                    <input type="password" id="keyword" placeholder="請輸入密碼" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">登入系統</button>
        </form>
        
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>
        
        <div class="demo-hint">
            <strong>💡 登入說明：</strong><br>
            • 老娘夥伴限定登入，閒雜人等速速離開<br>
            • 忘記密碼請聯絡管理員
        </div>
        
        <div class="footer-note">
            © 老娘領地 點數系統
        </div>
    </div>

    <!-- 分店選擇彈窗 -->
    <div id="branchModal" class="branch-modal">
        <div class="branch-modal-content">
            <div class="branch-title">🏪 選擇分店</div>
            <div id="staffInfo" class="staff-info"></div>
            <select id="branchSelect" class="branch-select">
                <option value="">-- 請選擇分店 --</option>
            </select>
            <button class="confirm-btn" onclick="confirmBranch()">確認進入系統</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxG_hODWUpJqVtO_iSPgxvXpiWSZ-v6dRp030KojMJGOsUARMj48ipk9fjZUNrHvIaNdg/exec";
        
        let currentStaff = null; // 儲存登入者資訊
        
        // 產生設備唯一 ID（Device Token）
function getDeviceId() {
    let deviceId = localStorage.getItem('device_id');
    if (!deviceId) {
        const screenInfo = `${screen.width}x${screen.height}`;
        const timeStamp = Date.now();
        const randomStr = Math.random().toString(36).substring(2, 15);
        deviceId = btoa(`${screenInfo}_${timeStamp}_${randomStr}`).substring(0, 32);
        localStorage.setItem('device_id', deviceId);
    }
    return deviceId;
}

// 取得設備名稱
function getDeviceName() {
    const ua = navigator.userAgent;
    if (ua.indexOf('iPhone') > -1) return 'iPhone';
    if (ua.indexOf('iPad') > -1) return 'iPad';
    if (ua.indexOf('Android') > -1) return 'Android Phone';
    return 'Unknown Device';
}
        
        function togglePassword() {
            const passwordInput = document.getElementById('keyword');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        }

        // 取得分店清單
        async function getBranchList() {
            try {
                const res = await fetch(`${GAS_URL}?action=getShopList`);
                const data = await res.json();
                return data.success ? data.shops : [];
            } catch (e) {
                return [];
            }
        }

        // 顯示分店選擇視窗
        async function showBranchModal(staff) {
            currentStaff = staff;
            const branches = await getBranchList();
            
            document.getElementById('staffInfo').textContent = `👤 歡迎回來，${staff.name}`;
            
            const select = document.getElementById('branchSelect');
            select.innerHTML = '<option value="">-- 請選擇分店 --</option>';
            branches.forEach(b => {
                select.innerHTML += `<option value="${b}">${b}</option>`;
            });
            
            document.getElementById('branchModal').style.display = 'flex';
        }

       // ✅ 確認分店（這裡幫妳把抓到的 IP 傳到下一頁 URL）
    function confirmBranch() {
        const branch = document.getElementById('branchSelect').value;
        if (!branch) {
            showError('⚠️ 請一定要選擇分店才能進入系統！');
            return;
        }

        // 保持妳原本的跳轉邏輯，補上 clientIp
        const url = `staff.html?name=${encodeURIComponent(currentStaff.name)}&branch=${encodeURIComponent(branch)}&loginId=${encodeURIComponent(currentStaff.loginId)}&role=${encodeURIComponent(currentStaff.role || '')}&clientIp=${encodeURIComponent(currentStaff.clientIp || '')}`;
        window.location.href = url;
    }

    // 🚀 核心登入函數（補上 IP 抓取，其餘不動）
    async function handleLogin(event) {
        event.preventDefault();
        
        const userId = document.getElementById('userId').value.trim();
        const keyword = document.getElementById('keyword').value.trim();
        const loginBtn = document.getElementById('loginBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        
        if (!userId || !keyword) {
            showError('請輸入完整的帳號和密碼');
            return;
        }
        
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> 驗證中...';
        errorMsgDiv.style.display = 'none';
        
        try {
            // 🌐 【新增：抓取 IP】這是唯一多加的東西
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            const clientIp = ipData.ip;

            const deviceId = getDeviceId();
            const deviceName = getDeviceName();

            // ✅ 拼接妳原本的 verifyUrl，並帶入 clientIp
            const verifyUrl = `${GAS_URL}?action=staffLogin&userId=${encodeURIComponent(userId)}&keyword=${encodeURIComponent(keyword)}&deviceId=${encodeURIComponent(deviceId)}&deviceName=${encodeURIComponent(deviceName)}&clientIp=${encodeURIComponent(clientIp)}`;
            
            const response = await fetch(verifyUrl);
            const result = await response.json();
            
            if (result.success) {
                // 儲存完整的登入資訊
                currentStaff = {
                    name: result.name,
                    role: result.role || "夥伴",
                    loginId: result.loginId || userId,
                    clientIp: clientIp // 存起來給後面 confirmBranch 用
                };
                
                // 驗證通過 → 彈窗選擇分店
                await showBranchModal(currentStaff);
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '登入系統';
            } else {
                // 這裡會顯示妳後端傳回來的「非店內網路」或「帳密錯誤」
                showError(result.message || '帳號或密碼錯誤，請重新輸入');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '登入系統';
            }
            
        } catch (error) {
            console.error('登入失敗:', error);
            showError('網路連線失敗，請檢查 WIFI 是否連上');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '登入系統';
        }
    }

    function showError(message) {
        const errorMsgDiv = document.getElementById('errorMsg');
        errorMsgDiv.textContent = message;
        errorMsgDiv.style.display = 'block';
        
        setTimeout(() => {
            errorMsgDiv.style.display = 'none';
        }, 3000);
    }
    
    document.getElementById('userId').focus();
</script>
</body>
</html>
