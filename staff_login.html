<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老娘領地 - 店員登入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #8b0000 0%, #ab545a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .logo {
            margin-bottom: 8px;
            text-align: center;
        }

        /* 這裡放大成 140px */
        .logo-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            display: inline-block;
        }
        
        h1 {
            font-size: 28px;
            color: #8b0000;
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
        }
        
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #8b0000;
            background: white;
            box-shadow: 0 0 0 3px rgba(139,0,0,0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #8b0000;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        .login-btn:hover {
            background: #6b0000;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139,0,0,0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #ffe5e5;
            color: #d00;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        
        .success-message {
            background: #e5ffe5;
            color: #2e7d32;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        
        .footer-note {
            margin-top: 28px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
        
        .demo-hint {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 16px;
            color: #666;
            text-align: left;
        }
        
        .demo-hint strong {
            color: #8b0000;
        }
        
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-card">
        
        <div class="logo">
            <img src="https://i.postimg.cc/KvytPffF/wei-ming-ming-she-ji-(23).png" class="logo-img">
        </div>

        <h1>老娘領地</h1>
        <div class="subtitle">店員登入系統</div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>📱 登入帳號</label>
                <input type="text" id="userId" placeholder="請輸入帳號" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>🔑 登入密碼</label>
                <div class="password-wrapper">
                    <input type="password" id="keyword" placeholder="請輸入密碼" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">登入系統</button>
        </form>
        
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>
        
        <div class="demo-hint">
            <strong>💡 登入說明：</strong><br>
            • 老娘夥伴限定登入，閒雜人等速速離開<br>
            • 忘記密碼請聯絡管理員
        </div>
        
        <div class="footer-note">
            © 老娘領地 點數系統
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzWv_dbuGFEEYaA1kfmh3yT8NG21XwmDIJEe6K4JU4z-ilzjsEcudMcxlfaRIDT40GrSA/exec";
        
        function togglePassword() {
            const passwordInput = document.getElementById('keyword');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const userId = document.getElementById('userId').value.trim();
            const keyword = document.getElementById('keyword').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const errorMsgDiv = document.getElementById('errorMsg');
            const successMsgDiv = document.getElementById('successMsg');
            
            if (!userId || !keyword) {
                showError('請輸入完整的帳號和密碼');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> 驗證中...';
            errorMsgDiv.style.display = 'none';
            successMsgDiv.style.display = 'none';
            
            try {
                const verifyUrl = `${GAS_URL}?action=staffLogin&userId=${encodeURIComponent(userId)}&keyword=${encodeURIComponent(keyword)}`;
                const response = await fetch(verifyUrl);
                const result = await response.json();
                
                if (result.success) {
                    successMsgDiv.textContent = `✅ 歡迎回來，${result.name}！即將進入系統...`;
                    successMsgDiv.style.display = 'block';
                    
                    loginBtn.innerHTML = '✅ 驗證成功，進入系統...';
                    
                    const staffPageUrl = `staff.html?name=${encodeURIComponent(result.name)}&branch=${encodeURIComponent(result.branch || '')}&role=${encodeURIComponent(result.role || '')}`;
                    
                    setTimeout(() => {
                        window.location.href = staffPageUrl;
                    }, 800);
                    
                } else {
                    showError(result.message || '帳號或密碼錯誤，請重新輸入');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '登入系統';
                }
                
            } catch (error) {
                console.error('登入失敗:', error);
                showError('網路連線失敗，請稍後再試');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '登入系統';
            }
        }
        
        function showError(message) {
            const errorMsgDiv = document.getElementById('errorMsg');
            errorMsgDiv.textContent = message;
            errorMsgDiv.style.display = 'block';
            
            setTimeout(() => {
                errorMsgDiv.style.display = 'none';
            }, 5000);
        }
        
        document.getElementById('userId').focus();
    </script>
</body>
</html>
